# Local development stack: Postgres + the gallery API built from this repo.
# For production deployment see partal-infra-deployment.
version: "3.8"
services:

  db:
    image: docker.io/library/postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: galleryuser
      POSTGRES_PASSWORD: gallerypassword
      POSTGRES_DB: gallerydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  gallery-api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://galleryuser:gallerypassword@db:5432/gallerydb
      GALLERY_AUTH_TOKEN: local-dev-token
    ports:
      - "8091:8091"
    command: ["/app/partal-gallery-api", "--listen-address", "0.0.0.0:8091"]
    restart: unless-stopped

volumes:
  pgdata:
